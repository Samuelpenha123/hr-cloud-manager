<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - HR Cloud Manager</title>
<link rel="stylesheet" href="css/app.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-layout">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-brand">
      <span class="bi">☁️</span>
      <div><span class="bt">HR Cloud Manager</span><span class="bs" id="sbCompany">Mi Empresa</span></div>
    </div>
    <nav class="sb-nav" id="sbNav">
      <!-- Renderizado dinámicamente según rol -->
    </nav>
    <div class="sb-footer">
      <div class="user-info">
        <div class="u-avatar" id="sbAvatar">A</div>
        <div><span class="u-name" id="sbName">Usuario</span><span class="u-company" id="sbRole">Admin</span></div>
      </div>
      <button class="btn btn-ghost btn-full btn-sm" onclick="Auth.logout()" style="color:var(--gray-400);border-color:rgba(255,255,255,.1)">🚪 Cerrar Sesión</button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-l">
        <button onclick="document.getElementById('sidebar').classList.toggle('open')" style="background:none;border:none;font-size:22px;cursor:pointer;display:none" id="menuBtn">☰</button>
        <div><div class="pg-title" id="pgTitle">Dashboard</div><div class="pg-sub" id="pgSub">Resumen general del sistema</div></div>
      </div>
      <div class="topbar-r">
        <button class="nb-btn" onclick="nav('notifications')" title="Notificaciones">🔔<span class="nb-badge" id="nbBadge" style="display:none">0</span></button>
        <div style="display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--gray-100);border-radius:8px">
          <div class="u-avatar" id="tbAvatar" style="width:26px;height:26px;font-size:11px">A</div>
          <span id="tbName" style="font-size:13px;font-weight:600">Usuario</span>
        </div>
      </div>
    </header>
    <main class="page-content" id="pageContent">
      <div style="text-align:center;padding:60px"><div class="spinner"></div><p style="margin-top:14px;color:var(--gray-500)">Cargando...</p></div>
    </main>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/pages.js"></script>
<script>
Auth.requireAuth();
const user = Auth.getUser();
const ROLE = user?.role || 'employee';

if (user) {
  const ini = (user.name || 'U').charAt(0).toUpperCase();
  ['sbAvatar','tbAvatar'].forEach(id => document.getElementById(id).textContent = ini);
  document.getElementById('sbName').textContent    = user.name || 'Usuario';
  document.getElementById('sbRole').textContent    = roleLabel(ROLE);
  document.getElementById('sbCompany').textContent = user.company_name || 'Empresa';
  document.getElementById('tbName').textContent    = user.name || 'Usuario';
}

function roleLabel(r) {
  return {admin:'Administrador', manager:'Gerente', hr:'Recursos Humanos', employee:'Empleado'}[r] || r;
}

// Definición de menú por rol
const NAV_ITEMS = {
  admin: [
    { section: 'Principal' },
    { page: 'dashboard',      icon: '📊', label: 'Dashboard' },
    { section: 'Gestión RRHH' },
    { page: 'employees',      icon: '👥', label: 'Empleados' },
    { page: 'attendance',     icon: '📅', label: 'Asistencia' },
    { page: 'vacations',      icon: '🏖️', label: 'Vacaciones' },
    { page: 'documents',      icon: '📁', label: 'Documentos' },
    { section: 'Administración' },
    { page: 'users',          icon: '🔑', label: 'Usuarios' },
    { section: 'Análisis' },
    { page: 'reports',        icon: '📈', label: 'Reportes' },
    { page: 'notifications',  icon: '🔔', label: 'Notificaciones', badge: true },
  ],
  manager: [
    { section: 'Principal' },
    { page: 'dashboard',      icon: '📊', label: 'Dashboard' },
    { section: 'Gestión RRHH' },
    { page: 'employees',      icon: '👥', label: 'Empleados' },
    { page: 'attendance',     icon: '📅', label: 'Asistencia' },
    { page: 'vacations',      icon: '🏖️', label: 'Vacaciones' },
    { page: 'documents',      icon: '📁', label: 'Documentos' },
    { section: 'Análisis' },
    { page: 'reports',        icon: '📈', label: 'Reportes' },
    { page: 'notifications',  icon: '🔔', label: 'Notificaciones', badge: true },
  ],
  hr: [
    { section: 'Principal' },
    { page: 'dashboard',      icon: '📊', label: 'Dashboard' },
    { section: 'Gestión RRHH' },
    { page: 'employees',      icon: '👥', label: 'Empleados' },
    { page: 'attendance',     icon: '📅', label: 'Asistencia' },
    { page: 'vacations',      icon: '🏖️', label: 'Vacaciones' },
    { page: 'documents',      icon: '📁', label: 'Documentos' },
    { section: 'Análisis' },
    { page: 'reports',        icon: '📈', label: 'Reportes' },
    { page: 'notifications',  icon: '🔔', label: 'Notificaciones', badge: true },
  ],
  employee: [
    { section: 'Mi Espacio' },
    { page: 'dashboard',      icon: '📊', label: 'Mi Dashboard' },
    { page: 'my_attendance',  icon: '📅', label: 'Mi Asistencia' },
    { page: 'my_vacations',   icon: '🏖️', label: 'Mis Vacaciones' },
    { page: 'my_documents',   icon: '📁', label: 'Mis Documentos' },
    { section: 'Sistema' },
    { page: 'notifications',  icon: '🔔', label: 'Notificaciones', badge: true },
  ],
};

function buildNav() {
  const items = NAV_ITEMS[ROLE] || NAV_ITEMS.employee;
  const nav = document.getElementById('sbNav');
  nav.innerHTML = items.map(item => {
    if (item.section) return `<div class="nav-sec"><span class="nav-sec-lbl">${item.section}</span></div>`;
    return `<button class="nav-item" id="nav-${item.page}" onclick="nav('${item.page}')">
      <span class="nav-icon">${item.icon}</span>${item.label}
      ${item.badge ? '<span id="navBadge" class="badge badge-danger" style="margin-left:auto;display:none">0</span>' : ''}
    </button>`;
  }).join('');
}

const PAGE_TITLES = {
  dashboard:      ['Dashboard', 'Resumen general del sistema'],
  employees:      ['Empleados', 'Gestión del personal'],
  attendance:     ['Asistencia', 'Control de entradas y salidas'],
  vacations:      ['Vacaciones', 'Solicitudes y aprobaciones'],
  documents:      ['Documentos', 'Gestión documental del personal'],
  reports:        ['Reportes', 'Indicadores y estadísticas'],
  notifications:  ['Notificaciones', 'Alertas y avisos del sistema'],
  users:          ['Usuarios', 'Gestión de accesos y roles'],
  my_attendance:  ['Mi Asistencia', 'Tu historial de asistencia'],
  my_vacations:   ['Mis Vacaciones', 'Tus solicitudes de vacaciones'],
  my_documents:   ['Mis Documentos', 'Tus documentos personales'],
};

function nav(page) {
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  const btn = document.getElementById('nav-' + page);
  if (btn) btn.classList.add('active');

  const [t, s] = PAGE_TITLES[page] || ['', ''];
  document.getElementById('pgTitle').textContent = t;
  document.getElementById('pgSub').textContent   = s;

  // Redirigir páginas de empleado a sus versiones propias
  const loaders = {
    dashboard:     Pages.dashboard,
    employees:     Pages.employees,
    attendance:    Pages.attendance,
    vacations:     Pages.vacations,
    documents:     Pages.documents,
    reports:       Pages.reports,
    notifications: Pages.notifications,
    users:         Pages.users,
    my_attendance: Pages.myAttendance,
    my_vacations:  Pages.myVacations,
    my_documents:  Pages.myDocuments,
  };
  if (loaders[page]) loaders[page]();
}

async function refreshBadge() {
  try {
    const r = await API.get('/notifications');
    const n = r.unread_count || 0;
    ['nbBadge','navBadge'].forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.textContent = n; el.style.display = n > 0 ? 'flex' : 'none'; }
    });
  } catch {}
}

buildNav();
nav('dashboard');
refreshBadge();
setInterval(refreshBadge, 60000);
</script>
</body>
</html>
